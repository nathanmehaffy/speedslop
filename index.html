<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeedSlop</title>
  </head>
  <body>
    <canvas id="viewport" aria-label="SpeedSlop simulation"></canvas>
    <div id="hud">
      <div class="metrics" aria-live="polite">
        <span id="status">Initializing</span>
        <span id="fps">0 FPS</span>
        <span id="steps-per-second">0 steps/s</span>
        <span id="population">0 agents</span>
        <span id="births">0 births</span>
        <span id="deaths">0 deaths</span>
        <span id="generation">gen 0</span>
      </div>
      <div class="controls">
        <button id="pause" type="button" aria-pressed="false">Pause</button>
        <button id="reset" type="button">Reset</button>
        <button id="reset-view" type="button">Reset View</button>
        <label>
          Seed
          <input id="seed" type="number" min="0" step="1" inputmode="numeric" />
        </label>
        <label>
          Sim
          <select id="speed">
            <option value="0.25">0.25x</option>
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="5">5x</option>
            <option value="max" selected>Max</option>
          </select>
        </label>
        <label>
          Render
          <select id="render-fps">
            <option value="display" selected>Display</option>
            <option value="60">60 FPS</option>
            <option value="30">30 FPS</option>
            <option value="15">15 FPS</option>
          </select>
        </label>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
